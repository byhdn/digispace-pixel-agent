name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Install webview dependencies
        working-directory: webview-ui
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --allow-star-activation --out artifacts/digispace-ci.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digispace-vsix
          path: artifacts/digispace-ci.vsix
